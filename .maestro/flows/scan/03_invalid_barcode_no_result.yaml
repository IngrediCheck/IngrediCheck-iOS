appId: llc.fungee.ingredicheck
tags: [scan, error]
---
- runFlow: ../../subflows/launch/scan_barcode.yaml
- extendedWaitUntil:
    visible:
      id: scan_ui_test_inject_barcode_button
    timeout: 30000
- runFlow:
    file: ../../subflows/inject_barcode.yaml
    env:
      PRESET_LABEL: "Invalid"
- extendedWaitUntil:
    visible:
      text: We couldn't identify this product
    timeout: 40000
- assertVisible:
    text: We couldn't identify this product
