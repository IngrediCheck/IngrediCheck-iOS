appId: llc.fungee.ingredicheck
tags: [food-notes]
---
- runFlow: ../../subflows/launch/food_notes.yaml
- extendedWaitUntil:
    visible:
      id: food_notes_edit_allergies
    timeout: 30000
- tapOn:
    id: food_notes_edit_allergies
