appId: llc.fungee.ingredicheck
tags: [settings, auth, sign-out]
---
- runFlow: ../../subflows/launch/settings.yaml
- scrollUntilVisible:
    element:
      id: settings_sign_out_button
    direction: DOWN
    timeout: 30000
- tapOn:
    id: settings_sign_out_button
- extendedWaitUntil:
    visible:
      text: Sign out
    timeout: 10000
- tapOn:
    text: Sign out
