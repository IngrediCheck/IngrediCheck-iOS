appId: llc.fungee.ingredicheck
tags: [settings, auth, sign-out]
---
- runFlow: ../../subflows/launch/settings.yaml
- extendedWaitUntil:
    visible:
      id: settings_content_view
    timeout: 30000
- scrollUntilVisible:
    element:
      id: settings_sign_out_button
    direction: DOWN
    timeout: 30000
- tapOn:
    id: settings_sign_out_button
- extendedWaitUntil:
    visible:
      text: Not now
    timeout: 10000
- tapOn:
    text: Not now
- extendedWaitUntil:
    visible:
      id: settings_content_view
    timeout: 10000
- assertVisible:
    id: settings_content_view
