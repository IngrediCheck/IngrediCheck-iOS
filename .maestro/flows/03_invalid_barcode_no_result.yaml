appId: llc.fungee.ingredicheck
tags:
  - smoke
  - scanner
  - simulator
  - error
---
- runFlow: ../subflows/launch_scan_qa.yaml
- runFlow:
    file: ../subflows/inject_barcode.yaml
    env:
      BARCODE: "000000000000"
- extendedWaitUntil:
    visible:
      text: "We couldn't identify this product"
    timeout: 40000
- assertVisible:
    text: "We couldn't identify this product"
