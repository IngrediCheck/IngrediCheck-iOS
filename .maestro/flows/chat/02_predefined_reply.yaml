appId: llc.fungee.ingredicheck
tags: [chat]
---
- runFlow: ../../subflows/launch/chat.yaml
- extendedWaitUntil:
    visible:
      id: home_view
    timeout: 30000
- tapOn:
    text: Open chat
- extendedWaitUntil:
    visible:
      id: chat_view
    timeout: 30000
- tapOn:
    id: chat_input
- inputText: what should i avoid?
- tapOn:
    id: chat_send_button
- extendedWaitUntil:
    visible:
      text: Avoid peanuts, dairy, and lactose based on the seeded simulator profile\.
    timeout: 30000
- assertVisible:
    text: Avoid peanuts, dairy, and lactose based on the seeded simulator profile\.
