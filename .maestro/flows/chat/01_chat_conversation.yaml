appId: llc.fungee.ingredicheck
tags: [chat]
---
- runFlow: ../../subflows/launch/chat.yaml
- extendedWaitUntil:
    visible:
      id: home_view
    timeout: 30000
- tapOn:
    text: Open chat
- extendedWaitUntil:
    visible:
      id: chat_view
    timeout: 30000
- tapOn:
    text: "\"Type your answer...\""
- inputText: hello
- tapOn:
    text: Send
- extendedWaitUntil:
    visible:
      text: Hello from the simulator QA harness\.
    timeout: 30000
- assertVisible:
    text: Hello from the simulator QA harness\.
